name: Generate Daily Wallpaper

on:
  push:
    branches:
      - main
    paths:
      - "*.js"
      - "*.html"
      - "*.css"
      - "*.json"
      - ".github/workflows/generate.yml"
  schedule:
    # 中国时间 00:01 = UTC 16:01
    - cron: "1 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer

concurrency:
  group: generate-daily-wallpaper
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync current branch
        run: git pull --rebase origin "${GITHUB_REF_NAME}"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Cache Puppeteer browser
        uses: actions/cache@v5
        with:
          path: /home/runner/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: PUPPETEER_SKIP_DOWNLOAD=true npm ci

      - name: Install Puppeteer browser
        run: |
          test -n "$PUPPETEER_CACHE_DIR"
          chrome_path="$(node --input-type=module -e 'import puppeteer from "puppeteer"; console.log(await puppeteer.executablePath());')"
          if [ -x "$chrome_path" ]; then
            echo "Using cached Puppeteer browser: $chrome_path"
          else
            npx puppeteer browsers install chrome
          fi

      - name: Verify Puppeteer browser
        run: node --input-type=module -e 'import puppeteer from "puppeteer"; console.log(await puppeteer.executablePath());'

      - name: Install rendering fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f

      - name: Ensure holiday cache
        run: npm run refresh-holidays:if-needed

      - name: Validate holiday content
        run: |
          npm test
          npm run content:validate
          npm run content:gaps:check

      - name: Restore theme history
        run: npm run publish:restore-history

      - name: Render wallpaper
        run: npm run render

      - name: Collect failure diagnostics
        if: failure()
        run: npm run diagnostics

      - name: Upload render debug screenshots
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: render-debug
          path: |
            debug-render
            debug-action
          if-no-files-found: ignore

      - name: Commit generated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/holiday-cache.js
          git commit -m "chore: update generated data" || echo "No generated data changes"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Commit generated archive
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          npm run publish:archive
